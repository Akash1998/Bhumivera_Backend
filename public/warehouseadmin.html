<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | Warehouse Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(30, 41, 59, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #020617; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 custom-scrollbar">

<div id="loader" class="flex h-[80vh] items-center justify-center text-cyan-500 font-black uppercase tracking-widest animate-pulse text-sm">Decrypting Global Matrix...</div>

<div id="dashboard" class="hidden max-w-7xl mx-auto space-y-6">
    <div class="flex items-center justify-between pb-6 border-b border-slate-800">
        <div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tight flex items-center gap-3">
                Warehouse <span class="text-cyan-500">Command Center</span>
            </h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Live Global Sales Telemetry</p>
        </div>
        <div class="flex gap-3">
            <button onclick="loadData()" class="p-3 bg-slate-900 border border-slate-800 rounded-xl hover:text-cyan-400 transition-colors shadow-lg"><i data-lucide="refresh-cw"></i></button>
            <button onclick="logout()" class="p-3 bg-rose-500/10 border border-rose-500/30 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-colors shadow-lg"><i data-lucide="log-out"></i></button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 glass rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-800 bg-slate-950/50 flex items-center justify-between">
                <h3 class="text-xs font-black uppercase tracking-widest text-white flex items-center gap-2">
                    <i data-lucide="activity" class="text-purple-400 w-4 h-4"></i> Live Transaction Ledger
                </h3>
            </div>
            <div class="overflow-x-auto h-[600px] custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-950/80 border-b border-slate-800 sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="p-5 text-[9px] font-black uppercase text-slate-500 tracking-widest">Timestamp</th>
                            <th class="p-5 text-[9px] font-black uppercase text-slate-500 tracking-widest">Distributor Node</th>
                            <th class="p-5 text-[9px] font-black uppercase text-slate-500 tracking-widest">Product Dispatched</th>
                            <th class="p-5 text-[9px] font-black uppercase text-slate-500 tracking-widest text-right">Financials</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body" class="divide-y divide-slate-800/50">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="glass rounded-[2rem] p-6 h-fit shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-white mb-6 flex items-center gap-2">
                <i data-lucide="shield-check" class="text-emerald-400 w-4 h-4"></i> Authorized Distributors
            </h3>
            <div id="access-list" class="space-y-4">
                </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    const API_URL = '/api';
            const token = localStorage.getItem('token') || localStorage.getItem('ms_token');
    
    if (!token) window.location.href = '/login';

    async function authFetch(url) {
        return fetch(API_URL + url, { headers: { 'Authorization': `Bearer ${token}` } });
    }

    async function loadData() {
        try {
            // Verify Master Admin Status
            const authCheck = await authFetch('/warehouse/check-access');
            const authData = await authCheck.json();
            if(!authData.isAdmin) {
                document.body.innerHTML = '<div class="text-rose-500 text-center mt-20 font-black text-xl uppercase tracking-widest">RESTRICTED<br><span class="text-[10px] text-slate-500">Master Admin Clearance Required</span></div>';
                return;
            }

            // Fetch Data
            const [salesRes, usersRes] = await Promise.all([
                authFetch('/warehouse/admin/sales'),
                authFetch('/warehouse/admin/users')
            ]);
            
            const salesData = await salesRes.json();
            const usersData = await usersRes.json();

            // Populate Sales Ledger
            const tbody = document.getElementById('ledger-body');
            tbody.innerHTML = '';
            if(!salesData.sales || salesData.sales.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-500 text-[10px] font-black uppercase tracking-widest">No data blocks found.</td></tr>';
            } else {
                salesData.sales.forEach(trx => {
                    const date = new Date(trx.sold_at);
                    tbody.innerHTML += `
                        <tr class="hover:bg-cyan-500/5 transition-colors">
                            <td class="p-5">
                                <p class="text-xs font-bold text-slate-300">${date.toLocaleDateString()}</p>
                                <p class="text-[9px] font-mono text-slate-500 mt-0.5">${date.toLocaleTimeString()}</p>
                            </td>
                            <td class="p-5">
                                <p class="text-sm font-bold text-white">${trx.distributor_name || 'Unknown Identity'}</p>
                                <p class="text-[9px] text-emerald-500 font-black uppercase tracking-widest mt-0.5"><i data-lucide="store" class="w-3 h-3 inline"></i> ${trx.store_name}</p>
                            </td>
                            <td class="p-5">
                                <p class="text-sm font-bold text-cyan-400">${trx.product_name}</p>
                                <p class="text-[10px] text-slate-500 mt-0.5">Quantity: <span class="text-white font-black">${trx.quantity}</span></p>
                            </td>
                            <td class="p-5 text-right">
                                <p class="text-sm font-black text-emerald-400">₹${parseFloat(trx.total_value).toLocaleString()}</p>
                                <p class="text-[9px] text-slate-500 mt-0.5">@ ₹${parseFloat(trx.sale_price).toLocaleString()}/unit</p>
                            </td>
                        </tr>
                    `;
                });
            }

            // Populate Active Distributors
            const accessList = document.getElementById('access-list');
            accessList.innerHTML = '';
            const activeUsers = (usersData.users || []).filter(u => u.is_active === 1);
            if(activeUsers.length === 0) {
                accessList.innerHTML = '<p class="text-slate-500 text-[10px] text-center p-4 font-black uppercase tracking-widest">No active nodes.</p>';
            } else {
                activeUsers.forEach(u => {
                    accessList.innerHTML += `
                        <div class="p-5 bg-slate-950/60 border border-slate-800 rounded-[1rem] flex justify-between items-center hover:border-emerald-500/50 transition-colors">
                            <div>
                                <p class="text-sm font-bold text-white">${u.name}</p>
                                <p class="text-[9px] text-emerald-500 font-black uppercase tracking-widest mt-1">${u.store_name}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black text-cyan-400">${u.total_sales} Trx</p>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            lucide.createIcons();

        } catch (e) {
            console.error(e);
            alert("Matrix sync failed. Connection error.");
                        document.getElementById('loader').classList.add('hidden');
        }
    }

    function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }
    loadData();
</script>
</body>
</html>
