<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Warehouse | Anritvox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(30, 41, 59, 0.8); }
        .custom-input { background: #0f172a; border: 1px solid #1e293b; color: #fff; padding: 0.8rem 1rem; border-radius: 0.75rem; width: 100%; outline: none; transition: all 0.2s; }
        .custom-input:focus { border-color: #10b981; box-shadow: 0 0 0 1px #10b981; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

<div id="loader" class="text-emerald-500 animate-pulse font-black tracking-widest uppercase text-sm">Verifying Network Clearance...</div>

<div id="app" class="hidden w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
    <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-800">
        <div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tight flex items-center gap-2">
                <i data-lucide="package" class="text-emerald-500"></i> Local <span class="text-emerald-500">Warehouse</span>
            </h1>
            <p id="store-name" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Connecting...</p>
        </div>
        <button onclick="logout()" class="p-2.5 bg-rose-500/10 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all shadow-md"><i data-lucide="log-out" class="w-5 h-5"></i></button>
    </div>

    <form id="sale-form" class="space-y-6">
        <div>
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Select Product SKU</label>
            <select id="product_name" required class="custom-input appearance-none cursor-pointer">
                <option value="">Loading Inventory Database...</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Quantity Dispatched</label>
                <input type="number" id="quantity" min="1" value="1" required class="custom-input">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Sale Price (Per Unit ₹)</label>
                <input type="number" id="sale_price" min="0" step="0.01" required placeholder="e.g. 1500" class="custom-input">
            </div>
        </div>
        <button type="submit" class="w-full py-4 bg-emerald-500 text-slate-950 font-black uppercase text-xs tracking-widest rounded-xl hover:bg-emerald-400 transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] mt-4 flex items-center justify-center gap-2">
            <i data-lucide="server" class="w-4 h-4"></i> Log Transaction to Ledger
        </button>
    </form>
    
    <div id="status-msg" class="mt-5 text-center text-sm font-bold hidden"></div>
</div>

<script>
    lucide.createIcons();
    const API_URL = '/api'; 
            const token = localStorage.getItem('token') || localStorage.getItem('ms_token');
    
    // SECURITY INTERCEPTOR
    if (!token) {
        alert("Security Lock: Please log in at anritvox.com first.");
        window.location.href = '/login';
    }

    async function authFetch(url, options = {}) {
        return fetch(API_URL + url, {
            ...options,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(options.headers || {}) }
        });
    }

    async function init() {
        try {
            // 1. Verify access
            const accessRes = await authFetch('/warehouse/check-access');
            const accessData = await accessRes.json();
            
            if (!accessData.hasAccess && !accessData.isAdmin) {
                document.body.innerHTML = '<div class="text-rose-500 font-black text-xl text-center mt-20 uppercase tracking-widest">Access Denied<br><span class="text-[10px] text-slate-500">You lack distributor clearance.</span></div>';
                return;
            }

            document.getElementById('store-name').innerText = accessData.storeName || 'Master Admin Access';
            
            // 2. Fetch REAL products to prevent garbage data
            const prodRes = await authFetch('/products');
            const prodData = await prodRes.json();
            const select = document.getElementById('product_name');
            select.innerHTML = '<option value="">-- Select Valid Product --</option>';
            
                        const products = Array.isArray(prodData) ? prodData : (Array.isArray(prodData.data) ? prodData.data : (Array.isArray(prodData.products) ? prodData.products : []));
            products.forEach(p => { select.innerHTML += `<option value="${p.name}">${p.name}</option>`; });

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        } catch(e) {
            console.error(e);
            alert("Initialization failed. Please re-login.");
                        document.getElementById('loader').classList.add('hidden');
            document.body.insertAdjacentHTML('afterbegin', `<div style="position:fixed;top:0;left:0;right:0;background:#ef4444;color:#fff;padding:12px;text-align:center;font-weight:bold;z-index:999">
              Connection error: ${e.message || 'Please log in again'}.
              <a href="/login" style="color:#fff;text-decoration:underline;margin-left:8px">Login</a>
            </div>`);
        }
    }

    // 3. Submit flawless data payload
    document.getElementById('sale-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Syncing...'; btn.disabled = true;

        const payload = {
            product_name: document.getElementById('product_name').value,
            quantity: parseInt(document.getElementById('quantity').value),
            sale_price: parseFloat(document.getElementById('sale_price').value)
        };

        try {
            const res = await authFetch('/warehouse/log-sale', { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            const msg = document.getElementById('status-msg');
            msg.classList.remove('hidden');
            
            if(data.success) {
                msg.className = "mt-5 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-center text-[10px] font-black uppercase tracking-widest text-emerald-400";
                msg.innerText = "Transaction secured to ledger.";
                e.target.reset(); // Clear form
            } else {
                msg.className = "mt-5 p-3 rounded-lg bg-rose-500/10 border border-rose-500/30 text-center text-[10px] font-black uppercase tracking-widest text-rose-400";
                msg.innerText = data.message || "Sync failed.";
            }
            setTimeout(() => msg.classList.add('hidden'), 4000);
        } catch(err) { alert("Network error."); } 
        finally { btn.innerHTML = originalText; btn.disabled = false; }
    });

    function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }
    init();
</script>
</body>
</html>
